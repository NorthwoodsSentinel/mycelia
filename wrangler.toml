name = "mycelia-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "mycelia-db"
database_id = "TO_BE_FILLED"

[[kv_namespaces]]
binding = "KV"
id = "TO_BE_FILLED"

[[r2_buckets]]
binding = "R2_AUDIT"
bucket_name = "mycelia-audit"

# Cron trigger for timeouts/expiry
[triggers]
crons = ["*/15 * * * *"]
